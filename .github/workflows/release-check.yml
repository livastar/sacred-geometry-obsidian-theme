name: Release Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build release CSS
        run: npm run build

      - name: Verify release files
        run: npm run check

      - name: Ensure build is committed
        run: git diff --exit-code -- theme.css
