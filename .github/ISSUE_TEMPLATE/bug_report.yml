name: Bug report
description: Report a visual, compatibility, or usability issue in the theme.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong, and what did you expect to happen?
    validations:
      required: true
  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: "1.8.10"
    validations:
      required: true
  - type: input
    id: theme-version
    attributes:
      label: Theme version
      placeholder: "0.4.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Desktop
        - Mobile
        - Both
    validations:
      required: true
  - type: dropdown
    id: color-scheme
    attributes:
      label: Base color scheme
      options:
        - Dark
        - Light
        - Both
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use a small or sanitized vault when possible.
      placeholder: |
        1. Open ...
        2. Enable ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: snippets-plugins
    attributes:
      label: Enabled snippets and relevant plugins
      description: List CSS snippets and plugins that may affect the screen.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots with private vault content removed.
